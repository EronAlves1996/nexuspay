spring:
  application:
    name: nexuspay
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false
    format_sql: false
    properties:
      hibernate:
        ddl-auto: validate
        hbm2ddl:
          delimiter:;
  web:
    error:
      include-stacktrace: never
