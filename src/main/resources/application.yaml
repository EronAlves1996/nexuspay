spring:
  application:
    name: nexuspay
  datasource:
    url: jdbc:postgresql://localhost:5432/nexus_pay
    username: postgres 
    password: postgres
  jpa:
    show-sql: false
    format_sql: false
    properties:
      hibernate:
        ddl-auto: validate
        hbm2ddl:
          delimiter:;
  web:
    error:
      include-stacktrace: never
